name: Build & Compile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile ServiceStation.java
        run: |
          mkdir -p out
          javac -d out src/ServiceStation.java
          echo "✅ Compilation successful!"

      - name: Confirm compiled classes
        run: ls out/
